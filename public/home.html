<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Blog - Home</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="home.html" class="site-title">✏️ The Blog</a>
      <div class="header-right">
        <a href="about.html" class="nav-link">About</a>
        <a href="index.html" class="btn-small">Login / Sign Up</a>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-inner">
      <h1 class="hero-title">A place for ideas,<br/>stories & thoughts.</h1>
      <p class="hero-sub">Read what others are writing. Join to share your own.</p>
      <a href="index.html" class="btn-hero">Start Writing →</a>
    </div>
  </div>

  <!-- TOPIC STRIP -->
  <div class="topics-strip">
    <div class="topic-card">🌍 <span>Travel</span></div>
    <div class="topic-card">💡 <span>Ideas</span></div>
    <div class="topic-card">📖 <span>Stories</span></div>
    <div class="topic-card">🎨 <span>Creative</span></div>
    <div class="topic-card">💬 <span>Opinion</span></div>
  </div>

  <!-- PUBLIC POSTS -->
  <div class="page-wrapper">
    <div class="posts-section">
      <div class="posts-header">
        <h2>Latest Posts <span class="post-count" id="post-count"></span></h2>
      </div>
      <div id="posts-list">
        <p class="loading-text">Loading posts...</p>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>The Blog &mdash; <span id="year"></span> &mdash; <a href="about.html" style="color:#aaa;">About</a></p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    async function loadPosts() {
      try {
        const res = await fetch('/api/posts');
        const posts = await res.json();
        const list  = document.getElementById('posts-list');
        const count = document.getElementById('post-count');

        count.textContent = posts.length > 0 ? posts.length + ' posts' : '';

        if (!posts.length) {
          list.innerHTML = '<p class="loading-text">No posts yet.</p>';
          return;
        }

        list.innerHTML = posts.map(p => `
          <div class="post-card">
            <div class="post-header">
              <h3 class="post-title">${escHtml(p.title)}</h3>
            </div>
            <p class="post-meta">By <strong>${escHtml(p.username)}</strong> &middot; ${new Date(p.created_at).toLocaleDateString('en-US', {year:'numeric', month:'short', day:'numeric'})}</p>
            <p class="post-content">${escHtml(p.content.length > 200 ? p.content.slice(0, 200) + '...' : p.content)}</p>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('posts-list').innerHTML = '<p class="loading-text">Could not load posts.</p>';
      }
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadPosts();
  </script>
</body>
</html>
