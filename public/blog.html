<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Blog</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="blog.html" class="site-title">✏️ The Blog</a>
      <div class="header-right">
        <a href="about.html" class="nav-link">About</a>
        <span id="welcome-msg"></span>
        <button onclick="logout()" class="btn-small">Logout</button>
      </div>
    </div>
  </header>

  <!-- DECORATIVE TOPIC STRIP -->
  <div class="topics-strip">
    <div class="topic-card">🌍 <span>Travel</span></div>
    <div class="topic-card">💡 <span>Ideas</span></div>
    <div class="topic-card">📖 <span>Stories</span></div>
    <div class="topic-card">🎨 <span>Creative</span></div>
    <div class="topic-card">💬 <span>Opinion</span></div>
  </div>

  <div class="page-wrapper">

    <!-- WRITE POST -->
    <div class="write-section">
      <h2>Write a New Post</h2>
      <form id="postForm" class="write-form">
        <input type="text" id="post-title" placeholder="Post title..." required />
        <textarea id="post-content" placeholder="What's on your mind?" rows="5" required></textarea>
        <button type="submit">Publish Post →</button>
        <p class="msg" id="post-msg"></p>
      </form>
    </div>

    <hr class="divider" />

    <!-- TABS: ALL POSTS / MY POSTS -->
    <div class="view-tabs">
      <button class="view-tab active" id="tab-all"  onclick="switchTab('all')">All Posts</button>
      <button class="view-tab"        id="tab-mine" onclick="switchTab('mine')">My Posts</button>
    </div>

    <!-- POSTS -->
    <div class="posts-section">
      <div class="posts-header">
        <span class="post-count" id="post-count"></span>
        <input type="text" id="search-input" placeholder="🔍 Search posts..." oninput="filterPosts()" />
      </div>
      <div id="posts-list">
        <p class="loading-text">Loading posts...</p>
      </div>
    </div>

  </div>

  <footer class="site-footer">
    <p>The Blog &mdash; <span id="year"></span> &mdash; <a href="about.html" style="color:#aaa;">About</a></p>
  </footer>

  <script>
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user) window.location.href = 'index.html';

    document.getElementById('welcome-msg').textContent = 'Hi, ' + user.username;
    document.getElementById('year').textContent = new Date().getFullYear();

    let allPosts  = [];
    let activeTab = 'all';

    function logout() {
      localStorage.removeItem('user');
      window.location.href = 'index.html';
    }

    async function loadPosts() {
      const res = await fetch('/api/posts');
      allPosts = await res.json();
      filterPosts();
    }

    function switchTab(tab) {
      activeTab = tab;
      document.getElementById('tab-all').classList.toggle('active',  tab === 'all');
      document.getElementById('tab-mine').classList.toggle('active', tab === 'mine');
      document.getElementById('search-input').value = '';
      filterPosts();
    }

    function filterPosts() {
      const query = document.getElementById('search-input').value.toLowerCase().trim();
      let posts = activeTab === 'mine'
        ? allPosts.filter(p => p.user_id === user.id)
        : allPosts;
      if (query) posts = posts.filter(p => p.title.toLowerCase().includes(query));
      renderPosts(posts);
    }

    function renderPosts(posts) {
      const list  = document.getElementById('posts-list');
      const count = document.getElementById('post-count');
      count.textContent = posts.length + ' post' + (posts.length !== 1 ? 's' : '');

      if (!posts.length) {
        list.innerHTML = activeTab === 'mine'
          ? '<p class="loading-text">You have not written any posts yet.</p>'
          : '<p class="loading-text">No posts found.</p>';
        return;
      }

      list.innerHTML = posts.map(p => `
        <div class="post-card">
          <div class="post-header">
            <h3 class="post-title">${escHtml(p.title)}</h3>
            ${p.user_id === user.id ? `<button onclick="deletePost(${p.id})" class="btn-delete">Delete</button>` : ''}
          </div>
          <p class="post-meta">By <strong>${escHtml(p.username)}</strong> <span class="dot"></span> ${new Date(p.created_at).toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'})}</p>
          <p class="post-content">${escHtml(p.content)}</p>
        </div>
      `).join('');
    }

    document.getElementById('postForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const msg = document.getElementById('post-msg');
      btn.disabled = true;
      btn.textContent = 'Publishing...';
      msg.textContent = '';

      const res = await fetch('/api/posts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title:   document.getElementById('post-title').value.trim(),
          content: document.getElementById('post-content').value.trim(),
          user_id: user.id,
        })
      });

      btn.disabled = false;
      btn.textContent = 'Publish Post →';

      if (res.ok) {
        e.target.reset();
        msg.textContent = '✓ Post published!';
        msg.style.color = '#2e7d32';
        loadPosts();
      } else {
        msg.textContent = 'Failed to publish. Try again.';
        msg.style.color = '#c0392b';
      }
    });

    async function deletePost(id) {
      if (!confirm('Delete this post?')) return;
      const res = await fetch('/api/posts/' + id, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: user.id })
      });
      if (res.ok) loadPosts();
      else alert('Could not delete post.');
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadPosts();
  </script>
</body>
</html>
