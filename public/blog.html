<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="navbar">
    <strong>Blog App</strong>
    <div>
      <span id="welcome-msg"></span>
      <button onclick="logout()" class="btn-small">Logout</button>
    </div>
  </div>

  <div class="container">

    <!-- NEW POST FORM -->
    <div class="card">
      <h2>Write a New Post</h2>
      <form id="postForm">
        <label>Title</label>
        <input type="text" id="post-title" placeholder="Post title" required />
        <label>Content</label>
        <textarea id="post-content" placeholder="Write your post here..." rows="5" required></textarea>
        <button type="submit">Publish Post</button>
        <p class="msg" id="post-msg"></p>
      </form>
    </div>

    <!-- ALL POSTS -->
    <h2 style="margin-top: 2rem;">All Posts</h2>
    <div id="posts-list">
      <p>Loading posts...</p>
    </div>

  </div>

  <script>
    // Check login
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user) window.location.href = 'index.html';

    document.getElementById('welcome-msg').textContent = 'Hello, ' + user.username + '  |  ';

    function logout() {
      localStorage.removeItem('user');
      window.location.href = 'index.html';
    }

    // Load posts
    async function loadPosts() {
      const res = await fetch('/api/posts');
      const posts = await res.json();
      const list = document.getElementById('posts-list');

      if (!posts.length) {
        list.innerHTML = '<p>No posts yet. Be the first to write one!</p>';
        return;
      }

      list.innerHTML = posts.map(p => `
        <div class="card post-card">
          <h3>${escHtml(p.title)}</h3>
          <p class="post-meta">By <strong>${escHtml(p.username)}</strong> &middot; ${new Date(p.created_at).toLocaleDateString()}</p>
          <p>${escHtml(p.content)}</p>
          ${p.user_id === user.id ? `<button onclick="deletePost(${p.id})" class="btn-small btn-danger">Delete</button>` : ''}
        </div>
      `).join('');
    }

    // Submit post
    document.getElementById('postForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('post-msg');
      msg.textContent = '';

      const res = await fetch('/api/posts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title:   document.getElementById('post-title').value.trim(),
          content: document.getElementById('post-content').value.trim(),
          user_id: user.id,
        })
      });

      if (res.ok) {
        document.getElementById('postForm').reset();
        msg.textContent = 'Post published!';
        msg.style.color = 'green';
        loadPosts();
      } else {
        msg.textContent = 'Failed to publish post.';
        msg.style.color = 'red';
      }
    });

    // Delete post
    async function deletePost(id) {
      if (!confirm('Delete this post?')) return;
      const res = await fetch('/api/posts/' + id, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: user.id })
      });
      if (res.ok) loadPosts();
      else alert('Could not delete post.');
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadPosts();
  </script>
</body>
</html>
